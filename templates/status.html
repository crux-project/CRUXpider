<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUXpider - API状态</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='img/cruxpider-logo.svg') }}" alt="CRUXpider logo" class="brand-logo me-2">CRUXpider
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link active" href="/status">状态</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="text-center mb-5">
                    <h1 class="display-5 fw-bold">API状态检查</h1>
                    <p class="lead">检查各个API服务的可用性</p>
                </div>

                <div id="statusContainer" class="loading-spinner">
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                        <p class="mt-3">正在检查API状态...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAPIStatus();
        });

        async function checkAPIStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                displayStatus(data);
            } catch (error) {
                displayError('无法连接到API服务');
            }
        }

        function displayStatus(data) {
            const container = document.getElementById('statusContainer');
            
            const html = `
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <div class="card h-100 ${data.paperswithcode_available ? 'border-success' : 'border-warning'}">
                            <div class="card-body text-center">
                                <i class="fas fa-database fa-3x mb-3 ${data.paperswithcode_available ? 'text-success' : 'text-warning'}"></i>
                                <h5 class="card-title">Papers with Code API</h5>
                                <p class="card-text">论文数据集和代码仓库信息</p>
                                <span class="badge ${data.paperswithcode_available ? 'bg-success' : 'bg-warning'} fs-6">
                                    ${data.paperswithcode_available ? '✓ 可用' : '⚠ 不可用'}
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6 mb-4">
                        <div class="card h-100 ${data.arxiv_available ? 'border-success' : 'border-danger'}">
                            <div class="card-body text-center">
                                <i class="fas fa-file-alt fa-3x mb-3 ${data.arxiv_available ? 'text-success' : 'text-danger'}"></i>
                                <h5 class="card-title">arXiv API</h5>
                                <p class="card-text">论文基本信息和PDF链接</p>
                                <span class="badge ${data.arxiv_available ? 'bg-success' : 'bg-danger'} fs-6">
                                    ${data.arxiv_available ? '✓ 可用' : '✗ 不可用'}
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6 mb-4">
                        <div class="card h-100 ${data.pyalex_available ? 'border-success' : 'border-danger'}">
                            <div class="card-body text-center">
                                <i class="fas fa-network-wired fa-3x mb-3 ${data.pyalex_available ? 'text-success' : 'text-danger'}"></i>
                                <h5 class="card-title">OpenAlex API</h5>
                                <p class="card-text">相关论文搜索服务</p>
                                <span class="badge ${data.pyalex_available ? 'bg-success' : 'bg-danger'} fs-6">
                                    ${data.pyalex_available ? '✓ 可用' : '✗ 不可用'}
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6 mb-4">
                        <div class="card h-100 border-info">
                            <div class="card-body text-center">
                                <i class="fas fa-cogs fa-3x mb-3 text-info"></i>
                                <h5 class="card-title">CRUXpider Web</h5>
                                <p class="card-text">Web应用核心服务</p>
                                <span class="badge bg-success fs-6">✓ 运行中</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row mt-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title mb-0"><i class="fas fa-info-circle me-2"></i>服务说明</h5>
                            </div>
                            <div class="card-body">
                                <ul class="list-unstyled">
                                    <li class="mb-2"><strong>Papers with Code API:</strong> 提供论文相关的数据集、方法和代码仓库信息</li>
                                    <li class="mb-2"><strong>arXiv API:</strong> 提供论文的基本信息、分类、期刊和PDF链接</li>
                                    <li class="mb-2"><strong>OpenAlex API:</strong> 提供相关论文搜索和学术网络分析</li>
                                    <li class="mb-0"><strong>CRUXpider Web:</strong> 整合所有API服务的Web界面</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <a href="/" class="btn btn-primary">
                        <i class="fas fa-arrow-left me-2"></i>返回首页
                    </a>
                    <button onclick="checkAPIStatus()" class="btn btn-outline-primary ms-2">
                        <i class="fas fa-sync-alt me-2"></i>重新检查
                    </button>
                </div>
            `;
            
            container.innerHTML = html;
        }

        function displayError(message) {
            const container = document.getElementById('statusContainer');
            container.innerHTML = `
                <div class="alert alert-danger text-center">
                    <i class="fas fa-exclamation-triangle fa-2x mb-3"></i>
                    <h5>连接失败</h5>
                    <p>${message}</p>
                    <button onclick="checkAPIStatus()" class="btn btn-outline-danger">
                        <i class="fas fa-redo me-2"></i>重试
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUXpider - 系统仪表板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='img/cruxpider-logo.svg') }}" alt="CRUXpider logo" class="brand-logo me-2">CRUXpider
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link" href="/status">状态</a>
                <a class="nav-link" href="/api/docs">API文档</a>
                <a class="nav-link active" href="/dashboard">仪表板</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid my-4">
        <h1 class="mb-4">
            <i class="fas fa-tachometer-alt me-2"></i>系统仪表板
        </h1>

        <!-- 系统状态卡片 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h4 id="totalRequests">0</h4>
                                <small>总请求数</small>
                            </div>
                            <i class="fas fa-chart-line fa-2x"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-info">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h4 id="successRate">0%</h4>
                                <small>成功率</small>
                            </div>
                            <i class="fas fa-check-circle fa-2x"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-warning">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h4 id="avgResponseTime">0ms</h4>
                                <small>平均响应时间</small>
                            </div>
                            <i class="fas fa-clock fa-2x"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h4 id="uptime">0h</h4>
                                <small>运行时间</small>
                            </div>
                            <i class="fas fa-server fa-2x"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- 服务状态 -->
            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-cogs me-2"></i>服务状态
                        </h5>
                    </div>
                    <div class="card-body">
                        <div id="serviceStatus">
                            <div class="text-center">
                                <div class="spinner-border" role="status">
                                    <span class="visually-hidden">加载中...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 最近活动 -->
            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-history me-2"></i>最近活动
                        </h5>
                    </div>
                    <div class="card-body">
                        <div id="recentActivity" style="max-height: 300px; overflow-y: auto;">
                            <p class="text-muted">暂无活动记录</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 性能图表 -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-chart-area me-2"></i>性能趋势
                        </h5>
                    </div>
                    <div class="card-body">
                        <canvas id="performanceChart" width="400" height="100"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let performanceChart;
        let performanceData = {
            labels: [],
            datasets: [{
                label: '响应时间 (ms)',
                data: [],
                borderColor: 'rgb(75, 192, 192)',
                backgroundColor: 'rgba(75, 192, 192, 0.1)',
                tension: 0.1
            }]
        };

        document.addEventListener('DOMContentLoaded', function() {
            initializeChart();
            loadDashboardData();
            
            // 每30秒更新一次数据
            setInterval(loadDashboardData, 30000);
        });

        function initializeChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: performanceData,
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '响应时间 (ms)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: '时间'
                            }
                        }
                    }
                }
            });
        }

        async function loadDashboardData() {
            try {
                // 加载健康状态
                const healthResponse = await fetch('/api/health');
                const healthData = await healthResponse.json();
                
                updateServiceStatus(healthData.services);
                
                // 模拟性能数据更新（实际中应该从后端获取）
                updatePerformanceData();
                
            } catch (error) {
                console.error('加载仪表板数据失败:', error);
            }
        }

        function updateServiceStatus(services) {
            const statusHtml = Object.entries(services).map(([service, status]) => `
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="fw-bold">${getServiceName(service)}</span>
                    <span class="badge bg-${status ? 'success' : 'danger'}">
                        <i class="fas fa-${status ? 'check' : 'times'} me-1"></i>
                        ${status ? '正常' : '异常'}
                    </span>
                </div>
            `).join('');
            
            document.getElementById('serviceStatus').innerHTML = statusHtml;
        }

        function getServiceName(service) {
            const names = {
                'paperswithcode': 'Papers with Code',
                'arxiv': 'arXiv',
                'openalex': 'OpenAlex',
                'semantic_scholar': 'Semantic Scholar',
                'crossref': 'Crossref',
                'datacite': 'DataCite',
                'github_api': 'GitHub API',
                'github_search_fallback': 'GitHub Search Fallback'
            };
            return names[service] || service;
        }

        function updatePerformanceData() {
            const now = new Date();
            const timeLabel = now.toLocaleTimeString();
            
            // 模拟响应时间数据
            const responseTime = 100 + Math.random() * 200;
            
            performanceData.labels.push(timeLabel);
            performanceData.datasets[0].data.push(responseTime);
            
            // 只保留最近20个数据点
            if (performanceData.labels.length > 20) {
                performanceData.labels.shift();
                performanceData.datasets[0].data.shift();
            }
            
            performanceChart.update();
            
            // 更新统计卡片
            document.getElementById('avgResponseTime').textContent = Math.round(responseTime) + 'ms';
            document.getElementById('totalRequests').textContent = performanceData.labels.length;
            document.getElementById('successRate').textContent = '95%';
            
            const uptime = Math.floor(Math.random() * 24) + 1;
            document.getElementById('uptime').textContent = uptime + 'h';
        }
    </script>
</body>
</html>

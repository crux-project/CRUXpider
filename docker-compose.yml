services:
  cruxpider:
    build: .
    ports:
      - "5003:5003"
    environment:
      CRUXPIDER_HOST: 0.0.0.0
      CRUXPIDER_PORT: 5003
      CRUXPIDER_SECRET_KEY: ${CRUXPIDER_SECRET_KEY:-cruxpider-dev-secret}
      PYALEX_EMAIL: ${PYALEX_EMAIL:-}
      CROSSREF_MAILTO: ${CROSSREF_MAILTO:-}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5003/api/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
